<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#273755"><link rel="manifest" href="manifest.webmanifest">
<title>Ergovanta Hospitality CRM</title>
<style>
:root{--navy:#273755;--cream:#FDF9EE;--ink:#1A1A1A;--mut:#6B6B6B;--bd:#E5E5E5;--off:#F5F5F5;
--red:#a3372a;--amber:#9a6a12;--green:#0b6b43;--blue:#2a5b9a;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--off);color:var(--ink);padding-bottom:env(safe-area-inset-bottom)}
header{background:var(--navy);color:var(--cream);padding:16px 16px calc(14px + env(safe-area-inset-top));padding-top:calc(16px + env(safe-area-inset-top));position:sticky;top:0;z-index:5}
header h1{margin:0;font-size:17px;letter-spacing:.04em;font-weight:600}
header .sub{font-size:12px;opacity:.75;margin-top:3px}
.srch{position:relative;padding:12px 16px 0}
.srch input{width:100%;padding:11px 34px 11px 12px;font-size:15px;border:1px solid var(--bd);border-radius:10px;background:#fff;-webkit-appearance:none}
.qx{position:absolute;right:26px;top:21px;color:var(--mut);font-size:14px;display:none;cursor:pointer;padding:4px}
.qx.on{display:block}
.sumrow{display:flex;gap:8px;padding:12px 16px;overflow-x:auto}
.chip{flex:0 0 auto;background:#fff;border:1px solid var(--bd);border-radius:12px;padding:8px 12px;min-width:74px;text-align:center}
.chip b{display:block;font-size:20px;line-height:1}
.chip span{font-size:11px;color:var(--mut)}
.chip.red b{color:var(--red)}.chip.amber b{color:var(--amber)}.chip.green b{color:var(--green)}
.tabs{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto}
.tab{flex:0 0 auto;border:1px solid var(--bd);background:#fff;border-radius:20px;padding:7px 13px;font-size:13px;color:var(--mut)}
.tab.on{background:var(--navy);color:var(--cream);border-color:var(--navy)}
.list{padding:0 16px 24px}
.card{background:#fff;border:1px solid var(--bd);border-left-width:4px;border-radius:12px;padding:13px 14px;margin-bottom:11px}
.card.s-respond{border-left-color:var(--blue)}.card.s-overdue{border-left-color:var(--red)}
.card.s-due{border-left-color:var(--amber)}.card.s-scheduled{border-left-color:var(--bd)}
.card.s-won{border-left-color:var(--green)}.card.s-lost{border-left-color:var(--mut)}
.crow{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.idn{display:flex;gap:11px;align-items:flex-start;min-width:0}
.avatar{flex:0 0 auto;width:38px;height:38px;border-radius:9px;background:var(--navy);color:var(--cream);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:17px;background-size:cover;background-position:center;overflow:hidden}
.avatar.img{color:transparent;background-color:#fff;border:1px solid var(--bd)}
.rest{font-weight:600;font-size:16px}
.who{font-size:13px;color:var(--mut);margin-top:1px}
.nbh{display:inline-block;font-size:11px;color:var(--navy);background:#eef2f8;border-radius:5px;padding:2px 7px;margin-top:4px;margin-right:5px}
.badge{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap;text-transform:uppercase;letter-spacing:.03em}
.b-respond{background:#e7eef7;color:var(--blue)}.b-overdue{background:#f6e2de;color:var(--red)}
.b-due{background:#f6edd6;color:var(--amber)}.b-scheduled{background:var(--off);color:var(--mut)}
.b-won{background:#dcefe5;color:var(--green)}.b-lost{background:#eee;color:var(--mut)}
.meta{font-size:12.5px;color:var(--mut);margin-top:9px;display:flex;flex-wrap:wrap;gap:4px 14px}
.meta b{color:var(--ink);font-weight:600}
.acts{display:flex;gap:8px;margin-top:11px}
.acts a{flex:1;text-align:center;text-decoration:none;font-size:13px;font-weight:600;padding:9px;border-radius:9px;border:1px solid var(--bd);color:var(--navy)}
.acts a.call{background:var(--navy);color:var(--cream);border-color:var(--navy)}
.acts a.dis{opacity:.35;pointer-events:none}
.det{margin-top:10px;font-size:12.5px;color:#333;border-top:1px dashed var(--bd);padding-top:11px;display:none}
.det.open{display:block}
.qa{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:11px}
.qa a{flex:1 1 auto;min-width:64px;text-align:center;text-decoration:none;font-size:12px;font-weight:600;padding:8px 6px;border-radius:9px;border:1px solid var(--bd);color:var(--navy);background:#fff}
.qa a.dis{opacity:.32;pointer-events:none}
.sec{margin-bottom:11px}
.sech{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin-bottom:4px}
.row{display:flex;gap:7px;padding:1px 0}
.row .k{color:var(--mut);min-width:64px;flex:0 0 auto}
.row .v{color:var(--ink)}
.row .v a{color:var(--navy);text-decoration:none;word-break:break-all}
.note{color:#444}.hist{margin-top:7px}
.msg{padding:5px 0;border-top:1px solid var(--off)}
.msg:first-child{border-top:0}
.mhead{color:var(--mut)}
.mhead.out:before{content:"→ ";color:var(--navy)}.mhead.in:before{content:"← ";color:var(--green)}
.mtog{color:var(--navy);font-weight:600;cursor:pointer;white-space:nowrap}
.mbody{display:none;white-space:pre-wrap;color:#333;background:var(--off);border:1px solid var(--bd);border-radius:8px;padding:9px 10px;margin-top:6px;font-size:12.5px;line-height:1.5}
.mbody.open{display:block}
.atts{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.att{font-size:11.5px;font-weight:600;color:var(--navy);background:#fff;border:1px solid var(--bd);border-radius:8px;padding:5px 9px;cursor:pointer;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#viewer{position:fixed;inset:0;background:rgba(20,24,33,.92);z-index:50;display:none;flex-direction:column}
#viewer.open{display:flex}
.vbar{display:flex;justify-content:space-between;align-items:center;gap:10px;color:var(--cream);padding:calc(12px + env(safe-area-inset-top)) 16px 12px;font-size:14px;font-weight:600}
.vbar #vname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vclose{cursor:pointer;font-size:20px;padding:0 6px}
#vbody{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:auto;padding:0 10px 10px}
#vbody img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px}
#vbody iframe{width:100%;flex:1;border:0;background:#fff;border-radius:6px}
.vdl{display:block;color:var(--cream);text-decoration:underline;font-size:13px;padding:10px}
.vload{color:var(--cream);font-size:14px;padding:30px}
.tags{margin-top:7px;display:flex;flex-wrap:wrap;gap:5px}
.tg{font-size:10.5px;background:var(--off);border:1px solid var(--bd);border-radius:6px;padding:2px 6px;color:var(--mut)}
.seg{display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;background:var(--navy);color:var(--cream);border-radius:5px;padding:2px 7px;margin-top:4px}
.lk{display:block;font-size:12.5px;font-weight:600;color:var(--navy);text-decoration:none;padding:7px 9px;border:1px solid var(--bd);border-radius:8px;margin-top:5px;word-break:break-all}
.lock{max-width:340px;margin:14vh auto;padding:0 20px;text-align:center}
.lock h2{font-family:Georgia,'Cormorant Garamond',serif;color:var(--navy)}
.lock input{width:100%;padding:13px;font-size:16px;border:1px solid var(--bd);border-radius:10px;margin:12px 0}
.lock button{width:100%;padding:13px;font-size:15px;font-weight:600;background:var(--navy);color:var(--cream);border:0;border-radius:10px}
.err{color:var(--red);font-size:13px;min-height:18px}
.foot{text-align:center;color:var(--mut);font-size:11px;padding:8px}
</style></head><body>
<div id="lock" class="lock">
  <h2>Ergovanta Hospitality</h2>
  <p style="color:var(--mut);font-size:14px">Enter passcode to unlock the CRM.</p>
  <input id="pc" type="password" inputmode="text" autocomplete="off" placeholder="Passcode" enterkeyhint="go">
  <button id="go">Unlock</button>
  <div class="err" id="err"></div>
</div>
<div id="app" style="display:none">
  <header><h1>ERGOVANTA &nbsp;|&nbsp; CRM</h1><div class="sub" id="hsub"></div></header>
  <div class="srch"><input id="q" type="search" inputmode="search" autocomplete="off" placeholder="Search name, neighborhood, contact, tag…"><span id="qx" class="qx">✕</span></div>
  <div class="sumrow" id="sum"></div>
  <div class="tabs" id="tabs"></div>
  <div class="tabs" id="segtabs"></div>
  <div class="list" id="list"></div>
  <div class="foot">Built 2026-05-29 · works offline · data encrypted on device</div>
</div>
<div id="viewer">
  <div class="vbar"><span id="vname">Attachment</span><span class="vclose" data-vclose>✕</span></div>
  <div id="vbody"></div>
</div>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decrypt(pass){
  const raw=b64(BLOB), salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:200000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},true,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
  KEY=key;
  return JSON.parse(new TextDecoder().decode(pt));
}
let DATA=null, KEY=null, TAB="action", SEG="all", Q="";
async function openAtt(enc,mime,fn){
  if(!enc||!KEY){return;}
  const v=document.getElementById("viewer"), body=document.getElementById("vbody");
  document.getElementById("vname").textContent=fn||"Attachment";
  body.innerHTML='<div class="vload">Decrypting…</div>';
  v.classList.add("open");
  try{
    const resp=await fetch(enc,{cache:"force-cache"});
    const buf=new Uint8Array(await resp.arrayBuffer());
    const iv=buf.slice(0,12), ct=buf.slice(12);
    const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv},KEY,ct);
    const url=URL.createObjectURL(new Blob([pt],{type:mime}));
    if((mime||"").indexOf("image")===0){
      body.innerHTML=`<img src="${url}" alt="${esc(fn)}">`;
    }else{
      body.innerHTML=`<iframe src="${url}"></iframe><a class="vdl" href="${url}" download="${esc(fn)}" target="_blank" rel="noopener">Open / download</a>`;
    }
    v._url=url;
  }catch(_){body.innerHTML='<div class="vload">Could not open this file.</div>';}
}
function closeViewer(){
  const v=document.getElementById("viewer");
  v.classList.remove("open");
  if(v._url){URL.revokeObjectURL(v._url);v._url=null;}
  document.getElementById("vbody").innerHTML="";
}
const ST={respond:["Reply","b-respond","s-respond"],overdue:["Overdue","b-overdue","s-overdue"],
due:["Due","b-due","s-due"],scheduled:["Scheduled","b-scheduled","s-scheduled"],
won:["Won","b-won","s-won"],lost:["Lost","b-lost","s-lost"]};
const ORD={respond:0,overdue:1,due:2,scheduled:3,won:4,lost:5};
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function tel(p){return (p.phone||"").replace(/[^0-9+]/g,"");}
function mapUrl(p){return "https://maps.google.com/?q="+encodeURIComponent((p.address?p.address+", ":"")+p.restaurant);}
function igOf(p){return (p.social||[]).find(s=>/insta/i.test(s.platform||""));}
function mono(s){const m=(s||"").match(/[A-Za-z0-9]/);return m?m[0].toUpperCase():"•";}
function render(){
  const ps=DATA.prospects.slice().sort((a,b)=>(ORD[a._state]-ORD[b._state])||(b._overdue-a._overdue));
  const n=k=>ps.filter(k).length;
  document.getElementById("hsub").textContent=ps.length+" contacts · synced "+DATA.meta.last_synced;
  const sum=[["red",n(p=>p._state==="overdue"),"Overdue"],["amber",n(p=>p._state==="due"),"Due now"],
    ["blue",n(p=>p._state==="respond"),"Replies"],["",n(p=>p.stage==="live"),"Live"],["",ps.length,"Total"]];
  document.getElementById("sum").innerHTML=sum.map(s=>`<div class="chip ${s[0]}"><b>${s[1]}</b><span>${s[2]}</span></div>`).join("");
  const tabs=[["action","Action"],["all","All"],["live","Live"],["scheduled","Scheduled"],["won","Won"]];
  document.getElementById("tabs").innerHTML=tabs.map(t=>`<div class="tab ${TAB===t[0]?"on":""}" data-t="${t[0]}">${t[1]}</div>`).join("");
  const segs=[...new Set(ps.map(p=>p.segment||"other"))].sort();
  const segtabs=[["all","All segments"],...segs.map(s=>[s,s[0].toUpperCase()+s.slice(1)])];
  document.getElementById("segtabs").innerHTML=segs.length>1?segtabs.map(t=>`<div class="tab ${SEG===t[0]?"on":""}" data-s="${t[0]}">${t[1]}</div>`).join(""):"";
  let show=ps;
  if(Q){
    const q=Q.toLowerCase();
    show=ps.filter(p=>[p.restaurant,p.contact,p.title,p.email,p.neighborhood,p.borough,p.notes,p.website,(p.tags||[]).join(" ")].join(" ").toLowerCase().indexOf(q)>=0);
  }else{
    if(TAB==="action")show=ps.filter(p=>["respond","overdue","due"].includes(p._state));
    else if(TAB==="live")show=ps.filter(p=>p.stage==="live");
    else if(TAB==="scheduled")show=ps.filter(p=>p._state==="scheduled");
    else if(TAB==="won")show=ps.filter(p=>p.stage==="won");
  }
  if(SEG!=="all")show=show.filter(p=>(p.segment||"other")===SEG);
  document.getElementById("list").innerHTML=show.map(card).join("")||`<p style="color:var(--mut);text-align:center;padding:30px">${Q?"No matches.":"Nothing here."}</p>`;
  loadLogos();
}
function card(p){
  const st=ST[p._state]||ST.scheduled;
  const nx=p._next?("Next: "+p._next+(p._overdue>0?` <b style="color:var(--red)">(${p._overdue}d late)</b>`:"")):(p._state==="respond"?`<b style="color:var(--blue)">Reply waiting ${p._overdue}d</b>`:"—");
  const t=tel(p);
  const sub="Re: tableside lighting — "+esc(p.restaurant);
  const hist=(p._msgs||[]).map((m,i)=>{
    const mid=p.id+"-m"+i;
    const atts=(m.attachments||[]).filter(a=>a.enc).map(a=>`<span class="att" data-att-enc="${esc(a.enc)}" data-att-mime="${esc(a.mime||"")}" data-att-fn="${esc(a.filename||"file")}">${(a.mime||"").indexOf("image")===0?"🖼":"📄"} ${esc(a.filename||"attachment")}</span>`).join("");
    const bodyBtn=m.body?` <span class="mtog" data-mb="${mid}">view email</span>`:"";
    const bodyBlk=m.body?`<div class="mbody" id="mb-${mid}">${esc(m.body)}</div>`:"";
    return `<div class="msg"><div class="${m.dir} mhead">${m.date} · ${esc(m.subject)}${bodyBtn}</div>${bodyBlk}${atts?`<div class="atts">${atts}</div>`:""}</div>`;
  }).join("");
  const tags=(p.tags||[]).map(x=>`<span class="tg">${esc(x)}</span>`).join("");
  const links=(p.supplier_links||[]).length?`<div class="sec"><div class="sech">Supplier links</div>${p.supplier_links.map(l=>`<a class="lk" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a>`).join("")}</div>`:"";
  const seg=p.segment?`<div class="seg">${esc(p.segment)}</div>`:"";
  const ig=igOf(p);
  const mail="mailto:"+esc(p.email)+"?subject="+encodeURIComponent("Re: tableside lighting — "+p.restaurant);
  const qa=`<div class="qa">
     <a class="call ${t?"":"dis"}" href="${t?"tel:"+t:"#"}">Call</a>
     <a href="${mail}">Email</a>
     <a class="${p.website?"":"dis"}" href="${p.website?esc(p.website):"#"}" target="_blank" rel="noopener">Website</a>
     <a href="${esc(mapUrl(p))}" target="_blank" rel="noopener">Map</a>
     <a class="${ig?"":"dis"}" href="${ig?esc(ig.url):"#"}" target="_blank" rel="noopener">Instagram</a></div>`;
  const loc=`<div class="sec"><div class="sech">Location</div>
     ${p.address?`<div class="row"><span class="k">Address</span><span class="v">${esc(p.address)}</span></div>`:""}
     ${p.neighborhood?`<div class="row"><span class="k">Area</span><span class="v">${esc(p.neighborhood)}${p.borough?", "+esc(p.borough):""}</span></div>`:""}</div>`;
  const social=(p.social||[]).map(s=>`<div class="row"><span class="k">${esc(s.platform)}</span><span class="v"><a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.handle||s.url)}</a></span></div>`).join("");
  const contact=`<div class="sec"><div class="sech">Contact</div>
     ${p.contact?`<div class="row"><span class="k">Name</span><span class="v">${esc(p.contact)}${p.title?" · "+esc(p.title):""}</span></div>`:""}
     ${p.email?`<div class="row"><span class="k">Email</span><span class="v"><a href="${mail}">${esc(p.email)}</a></span></div>`:""}
     ${p.phone?`<div class="row"><span class="k">Phone</span><span class="v"><a href="tel:${t}">${esc(p.phone)}</a></span></div>`:""}
     ${p.website?`<div class="row"><span class="k">Website</span><span class="v"><a href="${esc(p.website)}" target="_blank" rel="noopener">${esc(p.website)}</a></span></div>`:""}
     ${social}</div>`;
  const notes=p.notes?`<div class="sec"><div class="sech">Notes</div><div class="note">${esc(p.notes)}</div></div>`:"";
  const history=hist?`<div class="sec"><div class="sech">Email history</div><div class="hist">${hist}</div></div>`:"";
  const tagsec=tags?`<div class="sec"><div class="sech">Tags</div><div class="tags">${tags}</div></div>`:"";
  return `<div class="card ${st[2]}">
   <div class="crow"><div class="idn">
     <div class="avatar" data-logo="${esc(p.logo_enc||"")}">${mono(p.restaurant)}</div>
     <div><div class="rest">${esc(p.restaurant)}</div>
       <div class="who">${esc(p.contact)}${p.title?" · "+esc(p.title):""}</div>
       <div>${p.neighborhood?`<span class="nbh">${esc(p.neighborhood)}</span>`:""}${seg}</div></div></div>
     <span class="badge ${st[1]}">${st[0]}</span></div>
   <div class="meta"><span>Last: <b>${p._last_contact||"—"}</b></span><span>${nx}</span><span>Touches: <b>${p._touches}</b></span></div>
   <div class="acts">
     <a class="call ${t?"":"dis"}" href="${t?"tel:"+t:"#"}">Call</a>
     <a href="${mail}">Email</a>
     <a href="#" data-x="${p.id}">Details</a></div>
   <div class="det" id="d-${p.id}">${qa}${loc}${contact}${notes}${history}${links}${tagsec}</div></div>`;
}
async function loadLogos(){
  if(!KEY)return;
  for(const el of document.querySelectorAll(".avatar[data-logo]")){
    const enc=el.getAttribute("data-logo"); if(!enc||el._done)continue; el._done=1;
    try{
      const r=await fetch(enc,{cache:"force-cache"});
      const b=new Uint8Array(await r.arrayBuffer());
      const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b.slice(0,12)},KEY,b.slice(12));
      const u=URL.createObjectURL(new Blob([pt]));
      el.classList.add("img"); el.style.backgroundImage=`url(${u})`;
    }catch(_){}
  }
}
document.addEventListener("click",e=>{
  const tb=e.target.closest("[data-t]"); if(tb){TAB=tb.dataset.t;render();return;}
  const sb=e.target.closest("[data-s]"); if(sb){SEG=sb.dataset.s;render();return;}
  const dx=e.target.closest("[data-x]"); if(dx){e.preventDefault();document.getElementById("d-"+dx.dataset.x).classList.toggle("open");return;}
  const mb=e.target.closest("[data-mb]"); if(mb){const el=document.getElementById("mb-"+mb.dataset.mb);el.classList.toggle("open");mb.textContent=el.classList.contains("open")?"hide email":"view email";return;}
  const at=e.target.closest("[data-att-enc]"); if(at){openAtt(at.dataset.attEnc,at.dataset.attMime,at.dataset.attFn);return;}
  if(e.target.closest("[data-vclose]")||e.target.id==="viewer"){closeViewer();return;}
});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeViewer();});
async function unlock(){
  const pass=document.getElementById("pc").value;
  try{DATA=await decrypt(pass);
    sessionStorage.setItem("evpc",pass);
    document.getElementById("lock").style.display="none";
    document.getElementById("app").style.display="block";render();
  }catch(_){document.getElementById("err").textContent="Wrong passcode.";}
}
document.getElementById("go").onclick=unlock;
document.getElementById("pc").addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});
const qi=document.getElementById("q");
qi.addEventListener("input",()=>{Q=qi.value.trim();document.getElementById("qx").classList.toggle("on",!!Q);render();});
document.getElementById("qx").addEventListener("click",()=>{Q="";qi.value="";document.getElementById("qx").classList.remove("on");render();qi.focus();});
const sv=sessionStorage.getItem("evpc"); if(sv){document.getElementById("pc").value=sv;unlock();}
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script></body></html>
